name: Deploy to news-bot
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH key setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.50.62.215 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no won3ho@34.50.62.215 << 'ENDSSH'
          pkill -9 -f 'python3 main.py' 2>/dev/null || true
          sleep 2
          cd ~/news_bot
          git fetch origin main
          git checkout origin/main -- news_bot/main.py
          git checkout origin/main -- news_bot/collector.py
          echo "=== main.py format check ==="
          grep -c "🚨" news_bot/main.py && echo "OLD FORMAT" || echo "NEW FORMAT OK"
          cd ~/news_bot/news_bot
          nohup python3 main.py >> ~/bot.log 2>&1 &
          echo "done"
          exit 0
          ENDSSH
