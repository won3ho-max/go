name: Deploy to news-bot
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH key setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.50.62.215 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no won3ho@34.50.62.215 << 'ENDSSH'
          echo "=== stop old service ==="
          sudo -n systemctl stop news_bot && echo "STOP: OK" || echo "STOP: FAILED (no sudo?)"
          sudo -n systemctl disable news_bot && echo "DISABLE: OK" || echo "DISABLE: FAILED"
          sudo -n pkill -u ubuntu -f python && echo "KILL: OK" || echo "KILL: FAILED"
          echo "=== pull & restart ==="
          cd ~/news_bot
          git pull origin main
          pkill -f 'python3 main.py' 2>/dev/null || true
          sleep 3
          cd ~/news_bot/news_bot
          nohup python3 main.py >> ~/bot.log 2>&1 &
          echo "done"
          exit 0
          ENDSSH
          
