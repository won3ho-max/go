name: Deploy to news-bot
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH key setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.50.62.215 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no won3ho@34.50.62.215 << 'ENDSSH'
          echo "=== force kill ==="
          pkill -9 -f 'python3 main.py' && echo "KILLED" || echo "no process"
          sleep 2
          ps aux | grep 'main.py' | grep -v grep || echo "confirmed dead"
          echo "=== pull & restart ==="
          cd ~/news_bot && git pull origin main
          sleep 1
          cd ~/news_bot/news_bot
          nohup python3 main.py >> ~/bot.log 2>&1 &
          echo "done"
          exit 0
          ENDSSH
