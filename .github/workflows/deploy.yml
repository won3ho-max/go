name: Deploy to news-bot

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.50.62.215
          username: won3ho
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          script: |
            cd ~/news_bot && git pull origin main
            kill $(pgrep -f "python3 main.py") 2>/dev/null || true
            sleep 3
            cd ~/news_bot/news_bot
            nohup python3 main.py >> ~/bot.log 2>&1 &
            disown
            echo "배포 완료"
