name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 UTC 09:00 (KST)

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date > .github/.keepalive
          git add .github/.keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive [skip ci]"
          git push
