name: 한탕 스터디 데일리 리포트

on:
  schedule:
    # 매일 오전 7시 KST = 전날 22:00 UTC (일~목 = 월~금 아침)
    - cron: '0 22 * * 0-4'  # re-enable schedule
  workflow_dispatch:
    inputs:
      test_mode:
        description: '테스트 모드 (개인 텔레그램으로 발송)'
        required: false
        type: boolean
        default: false

defaults:
  run:
    working-directory: hantang

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install --quiet \
            gspread google-auth \
            requests yfinance \
            Pillow python-dateutil \
            exchange_calendars

      - name: 주가 업데이트 + 카드뉴스 + 텔레그램
        env:
          GSHEETS_CREDENTIALS: ${{ secrets.GSHEETS_CREDENTIALS }}
          GSHEETS_ID:          ${{ secrets.GSHEETS_ID }}
          TELEGRAM_TOKEN:      ${{ secrets.HANTANG_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ inputs.test_mode == true && '1633958343' || secrets.TELEGRAM_CHAT_ID }}
        run: python update_gsheets.py
